project:
  name: stock-forecast-mlops
  version: "1.0.0"

data:
  tickers: ["AAPL", "MSFT", "GOOGL", "AMZN", "TSLA"]
  start_date: "2018-01-01"
  interval: "1d"
  raw_s3_prefix: "raw/ohlcv"
  processed_s3_prefix: "processed/features"

aws:
  region: "us-east-1"
  s3_bucket: "stock-forecast-mlops-data"

mlflow:
  tracking_uri: "sqlite:///mlflow.db"
  experiment_name: "stock-price-forecasting"

models:
  random_forest:
    n_estimators: 200
    max_depth: 10
    n_jobs: -1
  xgboost:
    n_estimators: 200
    learning_rate: 0.05
    max_depth: 6
    subsample: 0.8
    colsample_bytree: 0.8
  lstm:
    hidden_size: 64
    num_layers: 2
    dropout: 0.2
    epochs: 50
    local_epochs: 10
    batch_size: 32
    sequence_length: 30
    learning_rate: 0.001

training:
  env: local
  target_col: target_next_close
  early_stopping_patience: 5
  model_registry_dir: models/registry

api:
  host: "0.0.0.0"
  port: 8000

monitoring:
  drift_threshold: 0.1
  check_interval_hours: 24
