name: Docker — Build & Push

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/stock-forecast-mlops-api

jobs:
  build-and-push:
    name: Build Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Create CPU-only requirements for CI
        run: |
          cat > requirements-ci.txt << 'EOF'
          yfinance>=0.2.50
          pandas>=2.2.0
          numpy>=1.26.0
          scikit-learn>=1.4.0
          xgboost>=2.1.0
          --extra-index-url https://download.pytorch.org/whl/cpu
          torch>=2.1.0
          mlflow>=2.18.0
          fastapi>=0.115.0
          uvicorn[standard]>=0.32.0
          boto3>=1.35.0
          evidently>=0.4.30
          pyyaml>=6.0.1
          python-dotenv>=1.0.1
          httpx>=0.27.0
          joblib>=1.4.0
          ta>=0.11.0
          EOF

      - name: Create CI Dockerfile
        run: |
          cat > Dockerfile.ci << 'EOF'
          FROM python:3.11-slim AS builder
          WORKDIR /app
          RUN apt-get update && apt-get install -y --no-install-recommends \
              build-essential gcc g++ \
              && rm -rf /var/lib/apt/lists/*
          COPY requirements-ci.txt .
          RUN pip install --no-cache-dir --upgrade pip && \
              pip install --no-cache-dir --target=/app/packages \
                  --extra-index-url https://download.pytorch.org/whl/cpu \
                  -r requirements-ci.txt

          FROM python:3.11-slim AS runtime
          WORKDIR /app
          RUN apt-get update && apt-get install -y --no-install-recommends \
              libgomp1 curl \
              && rm -rf /var/lib/apt/lists/*
          COPY --from=builder /app/packages /usr/local/lib/python3.11/site-packages/
          COPY src/ ./src/
          COPY config/ ./config/
          COPY scripts/ ./scripts/
          RUN mkdir -p data/raw data/processed models/registry logs
          ENV PYTHONPATH=/app
          ENV PYTHONDONTWRITEBYTECODE=1
          ENV PYTHONUNBUFFERED=1
          RUN useradd --create-home --shell /bin/bash appuser && \
              chown -R appuser:appuser /app
          USER appuser
          EXPOSE 8000
          HEALTHCHECK --interval=30s --timeout=10s --start-period=15s --retries=3 \
              CMD curl -f http://localhost:8000/health || exit 1
          CMD ["python3", "-m", "uvicorn", "src.serving.app:app", \
               "--host", "0.0.0.0", "--port", "8000", "--workers", "1"]
          EOF

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.ci
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Print image details
        run: |
          echo "=================================================="
          echo "  Docker Image Published"
          echo "=================================================="
          echo "  Registry: ${{ env.REGISTRY }}"
          echo "  Image:    ${{ env.IMAGE_NAME }}"
          echo "  Tags:     ${{ steps.meta.outputs.tags }}"
          echo "=================================================="
          echo ""
          echo "  Pull with:"
          echo "  docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
