services:

  # ── FastAPI prediction API ─────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    container_name: stock-forecast-api
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./logs:/app/logs
      - ./mlflow.db:/app/mlflow.db
    environment:
      - PYTHONPATH=/app
      - MLFLOW_TRACKING_URI=sqlite:///mlflow.db
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── MLflow tracking UI ─────────────────────────────────────────────────────
  mlflow:
    image: python:3.11-slim
    container_name: stock-forecast-mlflow
    working_dir: /app
    ports:
      - "5001:5000"
    volumes:
      - .:/app
    command: >
      sh -c "pip install mlflow --quiet &&
             mlflow ui
               --backend-store-uri sqlite:///mlflow.db
               --host 0.0.0.0
               --port 5000"
    restart: unless-stopped

  # ── Airflow metadata database ──────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: stock-forecast-postgres
    environment:
      POSTGRES_USER:     airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB:       airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Airflow initialisation (runs once then exits) ──────────────────────────
  airflow-init:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    container_name: stock-forecast-airflow-init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR:               LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN:   postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__FERNET_KEY:             ""
      AIRFLOW__CORE__LOAD_EXAMPLES:          "false"
      AIRFLOW__WEBSERVER__SECRET_KEY:        "stock-forecast-mlops-secret"
      PYTHONPATH:                            /opt/airflow
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./data:/opt/airflow/data
      - ./models:/opt/airflow/models
      - ./logs:/opt/airflow/logs
    command: bash -c "airflow db migrate && airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com"
    restart: on-failure

  # ── Airflow webserver ──────────────────────────────────────────────────────
  airflow-webserver:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    container_name: stock-forecast-airflow-webserver
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR:               LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN:   postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__FERNET_KEY:             ""
      AIRFLOW__CORE__LOAD_EXAMPLES:          "false"
      AIRFLOW__WEBSERVER__SECRET_KEY:        "stock-forecast-mlops-secret"
      PYTHONPATH:                            /opt/airflow
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./data:/opt/airflow/data
      - ./models:/opt/airflow/models
      - ./logs:/opt/airflow/logs
    command: airflow webserver
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Airflow scheduler ──────────────────────────────────────────────────────
  airflow-scheduler:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    container_name: stock-forecast-airflow-scheduler
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR:               LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN:   postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__FERNET_KEY:             ""
      AIRFLOW__CORE__LOAD_EXAMPLES:          "false"
      AIRFLOW__WEBSERVER__SECRET_KEY:        "stock-forecast-mlops-secret"
      PYTHONPATH:                            /opt/airflow
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./data:/opt/airflow/data
      - ./models:/opt/airflow/models
      - ./logs:/opt/airflow/logs
    command: airflow scheduler
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  default:
    name: stock-forecast-network
